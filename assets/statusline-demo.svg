<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200" fill="none">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="750" height="200" rx="10" fill="url(#termBg)"/>
  <rect width="750" height="200" rx="10" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title bar -->
  <rect width="750" height="36" rx="10" fill="#21262d"/>
  <rect x="0" y="26" width="750" height="10" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="375" y="22" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Terminal — claude</text>

  <!-- Line 1: Solo mode -->
  <text x="20" y="65" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="14">
    <tspan fill="#6e7681">~/ $</tspan>
    <tspan fill="#c9d1d9"> claude </tspan>
  </text>
  <rect x="20" y="74" width="520" height="26" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="30" y="92" font-family="monospace" font-size="13">
    <tspan fill="#ff4444" font-weight="700">[ENFORCE:SOLO]</tspan>
    <tspan fill="#484f58">  Solo dev — universal rules active</tspan>
  </text>

  <!-- Line 2: Team mode -->
  <rect x="20" y="108" width="520" height="26" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="30" y="126" font-family="monospace" font-size="13">
    <tspan fill="#ff6b6b" font-weight="700">[ENFORCE:TEAM]</tspan>
    <tspan fill="#484f58">  + parallel execution, cost tracking</tspan>
  </text>

  <!-- Line 3: Combined with caveman -->
  <rect x="20" y="142" width="520" height="26" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>
  <text x="30" y="160" font-family="monospace" font-size="13">
    <tspan fill="#e8a349" font-weight="700">[CAVEMAN]</tspan>
    <tspan fill="#c9d1d9"> </tspan>
    <tspan fill="#ff4444" font-weight="700">[ENFORCE:PROD]</tspan>
    <tspan fill="#484f58">  coexists!</tspan>
  </text>

  <!-- Annotation -->
  <text x="570" y="92" font-family="monospace" font-size="11" fill="#3fb950">&#x2190; auto-configured</text>
  <text x="570" y="160" font-family="monospace" font-size="11" fill="#3fb950">&#x2190; unified statusline</text>
</svg>
