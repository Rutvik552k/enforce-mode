<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" fill="none">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="800" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="360" rx="10" fill="url(#dbg)"/>
  <rect width="800" height="360" rx="10" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" fill="#21262d"/>
  <rect x="0" y="26" width="800" height="10" fill="#21262d"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="22" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Domain Detection — Weighted Signal Scoring</text>

  <!-- Project scan visualization -->
  <g transform="translate(30, 50)">
    <!-- Project files column -->
    <text x="0" y="15" font-family="monospace" font-size="13" fill="#58a6ff" font-weight="600">Your Project</text>

    <rect x="0" y="25" width="200" height="270" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>

    <text x="12" y="48" font-family="monospace" font-size="11" fill="#e3b341">requirements.txt</text>
    <text x="22" y="64" font-family="monospace" font-size="10" fill="#8b949e">torch==2.1.0</text>
    <text x="22" y="78" font-family="monospace" font-size="10" fill="#8b949e">transformers</text>
    <text x="22" y="92" font-family="monospace" font-size="10" fill="#8b949e">ffmpeg-python</text>
    <text x="22" y="106" font-family="monospace" font-size="10" fill="#8b949e">fastapi</text>

    <text x="12" y="130" font-family="monospace" font-size="11" fill="#e3b341">package.json</text>
    <text x="22" y="146" font-family="monospace" font-size="10" fill="#8b949e">express: ^4.18</text>

    <text x="12" y="170" font-family="monospace" font-size="11" fill="#e3b341">Dockerfile</text>
    <text x="12" y="194" font-family="monospace" font-size="11" fill="#e3b341">models/</text>
    <text x="22" y="210" font-family="monospace" font-size="10" fill="#8b949e">model.safetensors</text>

    <text x="12" y="234" font-family="monospace" font-size="11" fill="#e3b341">renders/</text>
    <text x="12" y="258" font-family="monospace" font-size="11" fill="#e3b341">terraform/</text>
    <text x="22" y="274" font-family="monospace" font-size="10" fill="#8b949e">main.tf</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(250, 175)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#484f58" stroke-width="2"/>
    <polygon points="60,-5 70,0 60,5" fill="#484f58"/>
    <text x="35" y="-10" font-family="monospace" font-size="9" fill="#6e7681" text-anchor="middle">scan</text>
  </g>

  <!-- Signal scoring column -->
  <g transform="translate(340, 50)">
    <text x="0" y="15" font-family="monospace" font-size="13" fill="#58a6ff" font-weight="600">Signal Scoring</text>

    <!-- ML Inference -->
    <rect x="0" y="25" width="190" height="48" rx="6" fill="#ff444410" stroke="#ff444440" stroke-width="1"/>
    <text x="10" y="43" font-family="monospace" font-size="11" fill="#ff6b6b" font-weight="600">ml-inference</text>
    <text x="10" y="60" font-family="monospace" font-size="10" fill="#8b949e">torch(3)+transformers(3)+models/(1)</text>
    <!-- Score bar -->
    <rect x="148" y="34" width="34" height="16" rx="3" fill="#ff4444" opacity="0.3"/>
    <text x="165" y="46" font-family="monospace" font-size="10" fill="#ff6b6b" text-anchor="middle" font-weight="700">7/4</text>

    <!-- Video Pipeline -->
    <rect x="0" y="82" width="190" height="48" rx="6" fill="#a371f710" stroke="#a371f740" stroke-width="1"/>
    <text x="10" y="100" font-family="monospace" font-size="11" fill="#bc8cff" font-weight="600">video-pipeline</text>
    <text x="10" y="117" font-family="monospace" font-size="10" fill="#8b949e">ffmpeg-python(3)+renders/(2)</text>
    <rect x="148" y="91" width="34" height="16" rx="3" fill="#a371f7" opacity="0.3"/>
    <text x="165" y="103" font-family="monospace" font-size="10" fill="#bc8cff" text-anchor="middle" font-weight="700">5/4</text>

    <!-- API Security -->
    <rect x="0" y="139" width="190" height="48" rx="6" fill="#1f6feb10" stroke="#1f6feb40" stroke-width="1"/>
    <text x="10" y="157" font-family="monospace" font-size="11" fill="#58a6ff" font-weight="600">api-security</text>
    <text x="10" y="174" font-family="monospace" font-size="10" fill="#8b949e">fastapi(2)+express(2)+Docker(2)</text>
    <rect x="148" y="148" width="34" height="16" rx="3" fill="#1f6feb" opacity="0.3"/>
    <text x="165" y="160" font-family="monospace" font-size="10" fill="#58a6ff" text-anchor="middle" font-weight="700">6/3</text>

    <!-- Cost Tracking -->
    <rect x="0" y="196" width="190" height="48" rx="6" fill="#23883810" stroke="#23883840" stroke-width="1"/>
    <text x="10" y="214" font-family="monospace" font-size="11" fill="#3fb950" font-weight="600">cost-tracking</text>
    <text x="10" y="231" font-family="monospace" font-size="10" fill="#8b949e">terraform/(3)+.tf(2)</text>
    <rect x="148" y="205" width="34" height="16" rx="3" fill="#238838" opacity="0.3"/>
    <text x="165" y="217" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle" font-weight="700">5/3</text>

    <!-- GPU Hardware - below threshold -->
    <rect x="0" y="253" width="190" height="48" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.5" stroke-dasharray="4,2"/>
    <text x="10" y="271" font-family="monospace" font-size="11" fill="#484f58">gpu-hardware</text>
    <text x="10" y="288" font-family="monospace" font-size="10" fill="#484f58">no signals detected</text>
    <rect x="148" y="262" width="34" height="16" rx="3" fill="#21262d"/>
    <text x="165" y="274" font-family="monospace" font-size="10" fill="#484f58" text-anchor="middle">0/4</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(548, 175)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#484f58" stroke-width="2"/>
    <polygon points="50,-5 60,0 50,5" fill="#484f58"/>
    <text x="30" y="-10" font-family="monospace" font-size="9" fill="#6e7681" text-anchor="middle">emit</text>
  </g>

  <!-- Output column -->
  <g transform="translate(620, 50)">
    <text x="0" y="15" font-family="monospace" font-size="13" fill="#58a6ff" font-weight="600">Active Rules</text>

    <rect x="0" y="25" width="150" height="220" rx="6" fill="#0d1117" stroke="#3fb95040" stroke-width="1"/>

    <text x="10" y="48" font-family="monospace" font-size="10" fill="#3fb950">&#x2713; universal</text>
    <text x="20" y="64" font-family="monospace" font-size="9" fill="#8b949e">6 rules (~1.7KB)</text>

    <text x="10" y="88" font-family="monospace" font-size="10" fill="#ff6b6b">&#x2713; ml-inference</text>
    <text x="20" y="104" font-family="monospace" font-size="9" fill="#8b949e">4 rules (~0.7KB)</text>

    <text x="10" y="128" font-family="monospace" font-size="10" fill="#bc8cff">&#x2713; video-pipeline</text>
    <text x="20" y="144" font-family="monospace" font-size="9" fill="#8b949e">6 rules (~0.7KB)</text>

    <text x="10" y="168" font-family="monospace" font-size="10" fill="#58a6ff">&#x2713; api-security</text>
    <text x="20" y="184" font-family="monospace" font-size="9" fill="#8b949e">10 rules (~1KB)</text>

    <text x="10" y="208" font-family="monospace" font-size="10" fill="#3fb950">&#x2713; cost-tracking</text>
    <text x="20" y="224" font-family="monospace" font-size="9" fill="#8b949e">7 rules (~0.7KB)</text>

    <!-- Budget bar -->
    <rect x="0" y="252" width="150" height="18" rx="4" fill="#21262d"/>
    <rect x="0" y="252" width="112" height="18" rx="4" fill="#23883830"/>
    <text x="75" y="264" font-family="monospace" font-size="9" fill="#3fb950" text-anchor="middle">4.8KB / 8KB budget</text>
  </g>
</svg>
