<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" rx="10" fill="url(#bgGrad)"/>
  <rect width="800" height="420" rx="10" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" fill="#21262d"/>
  <rect x="0" y="26" width="800" height="10" fill="#21262d"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="400" y="22" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">PECK Escalation — Live Demo</text>

  <!-- Step 1: Advisory -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="740" height="70" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>

    <!-- Tier badge -->
    <rect x="10" y="10" width="80" height="22" rx="4" fill="#23883820" stroke="#238636" stroke-width="1"/>
    <text x="50" y="25" font-family="monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">TIER 0</text>

    <!-- Action label -->
    <text x="100" y="26" font-family="monospace" font-size="12" fill="#8b949e">Advisory</text>

    <!-- Terminal output -->
    <text x="10" y="50" font-family="monospace" font-size="12">
      <tspan fill="#6e7681">claude&gt;</tspan>
      <tspan fill="#c9d1d9"> Edit auth.js </tspan>
      <tspan fill="#3fb950">&#x2713; allowed</tspan>
    </text>
    <text x="210" y="50" font-family="monospace" font-size="11" fill="#e3b341">&#x26A0; WebSearch for express-jwt docs before relying on training knowledge</text>

    <!-- Arrow -->
    <text x="370" y="78" font-family="monospace" font-size="16" fill="#484f58" text-anchor="middle">&#x25BC;</text>
  </g>

  <!-- Step 2: Warning -->
  <g transform="translate(30, 138)">
    <rect x="0" y="0" width="740" height="70" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="0.5"/>

    <rect x="10" y="10" width="80" height="22" rx="4" fill="#e3b34120" stroke="#e3b341" stroke-width="1"/>
    <text x="50" y="25" font-family="monospace" font-size="11" fill="#e3b341" text-anchor="middle" font-weight="600">TIER 1</text>

    <text x="100" y="26" font-family="monospace" font-size="12" fill="#8b949e">Warning</text>

    <text x="10" y="50" font-family="monospace" font-size="12">
      <tspan fill="#6e7681">claude&gt;</tspan>
      <tspan fill="#c9d1d9"> Edit auth.js </tspan>
      <tspan fill="#e3b341">&#x2713; allowed</tspan>
    </text>
    <text x="210" y="50" font-family="monospace" font-size="11" fill="#f85149">&#x26D4; ESCALATION: 2 research violations. Next violation = DENY. WebSearch now.</text>

    <text x="370" y="78" font-family="monospace" font-size="16" fill="#484f58" text-anchor="middle">&#x25BC;</text>
  </g>

  <!-- Step 3: Soft Block -->
  <g transform="translate(30, 226)">
    <rect x="0" y="0" width="740" height="70" rx="6" fill="#0d1117" stroke="#f8514930" stroke-width="1"/>

    <rect x="10" y="10" width="80" height="22" rx="4" fill="#f8514920" stroke="#f85149" stroke-width="1"/>
    <text x="50" y="25" font-family="monospace" font-size="11" fill="#f85149" text-anchor="middle" font-weight="600">TIER 2</text>

    <text x="100" y="26" font-family="monospace" font-size="12" fill="#8b949e">Soft Block</text>

    <text x="10" y="50" font-family="monospace" font-size="12">
      <tspan fill="#6e7681">claude&gt;</tspan>
      <tspan fill="#c9d1d9"> Edit auth.js </tspan>
      <tspan fill="#f85149" font-weight="700">&#x2717; DENIED</tspan>
    </text>
    <text x="210" y="50" font-family="monospace" font-size="11" fill="#f85149">Tool blocked. 1 retry remaining. Run WebSearch first, then retry.</text>

    <text x="370" y="78" font-family="monospace" font-size="16" fill="#484f58" text-anchor="middle">&#x25BC;</text>
  </g>

  <!-- Step 4: Hard Block -->
  <g transform="translate(30, 314)">
    <rect x="0" y="0" width="740" height="70" rx="6" fill="#1a0000" stroke="#f85149" stroke-width="1.5"/>

    <rect x="10" y="10" width="80" height="22" rx="4" fill="#f8514940" stroke="#f85149" stroke-width="1.5"/>
    <text x="50" y="25" font-family="monospace" font-size="11" fill="#ff7b72" text-anchor="middle" font-weight="700">TIER 3</text>

    <text x="100" y="26" font-family="monospace" font-size="12" fill="#ff7b72" font-weight="600">Hard Block</text>

    <text x="10" y="50" font-family="monospace" font-size="12">
      <tspan fill="#6e7681">claude&gt;</tspan>
      <tspan fill="#c9d1d9"> Edit auth.js </tspan>
      <tspan fill="#ff7b72" font-weight="700">&#x2717;&#x2717; HARD BLOCKED</tspan>
    </text>
    <text x="280" y="50" font-family="monospace" font-size="11" fill="#ff7b72">Category 'research' permanently blocked. Added to dead letter queue.</text>
  </g>

  <!-- Recovery annotation -->
  <g transform="translate(610, 260)">
    <rect x="0" y="0" width="155" height="46" rx="6" fill="#23883815" stroke="#238636" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="78" y="18" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">&#x21BA; K-Step Recovery</text>
    <text x="78" y="34" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="middle">5 calls to comply</text>
  </g>
</svg>
