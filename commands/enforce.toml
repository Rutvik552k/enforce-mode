description = "Switch enforcement level (solo/team/prod/off) or uninstall — persists across sessions"
prompt = """
If the argument starts with "init", do NOT switch levels. Tell the user to use the dedicated command `/enforce-init "<goal>"` to generate the local CLAUDE.md anchor (goal + tech stack + requirements + task list), then stop.

If the argument is "uninstall", run the cleanup script:
```
node ${CLAUDE_PLUGIN_ROOT}/hooks/enforce-uninstall.js
```
Then confirm what was removed. Do NOT proceed with level switching.

Otherwise, switch to enforce {{args}} mode. If no level specified, use solo.

IMPORTANT: Persist the level change by running this command:
```
node -e "const {setDefaultLevel} = require('${CLAUDE_PLUGIN_ROOT}/hooks/enforce-config'); console.log(setDefaultLevel('{{args}}'))"
```

After persisting, confirm active level and list detected project domains with their confidence scores. Apply the appropriate rules for the selected level immediately.

Note: The level is now saved to config and plugin settings — it will persist across sessions."""
